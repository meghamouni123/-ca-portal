<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookmarks — CA Daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0f1117;--paper:#faf8f3;--accent:#c8102e;--accent2:#1a3a5c;
    --gold:#d4a843;--muted:#6b7280;--border:#e5e0d5;--card-bg:#ffffff;
    --green:#16a34a;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--ink)}

  nav{position:sticky;top:0;z-index:200;background:rgba(250,248,243,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;gap:1rem}
  .logo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;color:var(--ink);text-decoration:none;white-space:nowrap}
  .logo span{color:var(--accent)}
  .nav-right{display:flex;align-items:center;gap:1rem}
  .nav-link{text-decoration:none;color:var(--muted);font-size:.88rem;font-weight:500;transition:color .2s}
  .nav-link:hover,.nav-link.active{color:var(--ink)}

  .page-wrap{max-width:860px;margin:0 auto;padding:2rem}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem}
  .page-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900}
  .page-title span{color:var(--gold)}
  .header-right{display:flex;align-items:center;gap:.75rem}
  .bm-count{font-size:.85rem;color:var(--muted)}
  .clear-btn{background:none;border:1.5px solid var(--border);border-radius:6px;padding:.35rem .85rem;font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;color:var(--muted);transition:all .2s}
  .clear-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

  .filter-bar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:1.25rem}
  .filter-btn{background:none;border:1.5px solid var(--border);border-radius:20px;padding:.3rem .85rem;font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;color:var(--muted);transition:all .2s}
  .filter-btn:hover,.filter-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  .article-card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:1.75rem;margin-bottom:1.25rem;transition:box-shadow .25s,transform .25s;animation:slideIn .35s ease both}
  .article-card:hover{box-shadow:0 10px 36px rgba(0,0,0,.09);transform:translateY(-2px)}
  .card-meta{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;margin-bottom:.9rem}
  .cat-badge{padding:.22rem .75rem;border-radius:4px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .source-label{font-size:.75rem;color:var(--muted);font-weight:500}
  .source-link{text-decoration:none;transition:color .2s}
  .source-link:hover{color:var(--accent)}
  .date-label{font-size:.75rem;color:var(--muted);margin-left:auto}
  .card-headline{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;line-height:1.4;color:var(--ink);margin-bottom:.85rem}
  .card-summary{font-size:.9rem;line-height:1.75;color:#374151}
  .card-footer{display:flex;align-items:center;gap:1rem;margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--border)}
  .view-src{text-decoration:none;font-size:.82rem;font-weight:600;color:var(--accent2);display:flex;align-items:center;gap:.3rem;transition:color .2s}
  .view-src:hover{color:var(--accent)}
  .copy-btn{background:none;border:none;cursor:pointer;font-size:.78rem;color:var(--muted);padding:.25rem .5rem;border-radius:4px;transition:background .2s}
  .copy-btn:hover{background:#f5f2eb;color:var(--ink)}
  .remove-btn{background:none;border:none;cursor:pointer;font-size:.78rem;color:var(--muted);padding:.25rem .5rem;border-radius:4px;transition:all .2s;margin-left:auto}
  .remove-btn:hover{color:var(--accent);background:#fff0f0}

  .empty-state{text-align:center;padding:5rem 2rem;color:var(--muted)}
  .empty-icon{font-size:3rem;margin-bottom:1rem}
  .empty-state h3{font-size:1.1rem;color:var(--ink);margin-bottom:.5rem}
  .empty-state a{color:var(--accent2);font-weight:600;text-decoration:none}
  .empty-state a:hover{color:var(--accent)}

  .c-eco{background:#e8f5e9;color:#2e7d32}
  .c-pol{background:#fff3e0;color:#e65100}
  .c-int{background:#e3f2fd;color:#1565c0}
  .c-sci{background:#f3e5f5;color:#6a1b9a}
  .c-sch{background:#fce4ec;color:#880e4f}
  .c-rep{background:#e8eaf6;color:#283593}
  .c-spo{background:#e0f7fa;color:#00695c}
  .c-awa{background:#fff8e1;color:#f57f17}
  .c-imp{background:#fbe9e7;color:#bf360c}
  .c-sum{background:#e0f2f1;color:#004d40}
  .c-nat{background:#e8f5e9;color:#1b5e20}
  .c-sta{background:#f9fbe7;color:#558b2f}

  @keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">CA<span>Daily</span></a>
  <div class="nav-right">
    <a href="index.html" class="nav-link">Home</a>
    <a href="news.html" class="nav-link">Current Affairs</a>
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="bookmarks.html" class="nav-link active">🔖 Bookmarks</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <div class="page-title">🔖 My <span>Bookmarks</span></div>
    <div class="header-right">
      <span class="bm-count" id="bmCount"></span>
      <button class="clear-btn" onclick="clearAll()">🗑 Clear All</button>
    </div>
  </div>

  <div class="filter-bar" id="filterBar"></div>
  <div id="articleList"></div>
</div>

<script>
const CAT_CLASS = {
  'Economy & Banking':'c-eco','Polity & Governance':'c-pol',
  'International Relations':'c-int','Science & Technology':'c-sci',
  'Schemes & Appointments':'c-sch','Reports & Indices':'c-rep',
  'Sports':'c-spo','Awards & Honours':'c-awa',
  'Important Days & Obituaries':'c-imp','Summits & Conferences':'c-sum',
  'National News':'c-nat','State News':'c-sta'
};

let activeFilter = 'All';

function getBookmarks(){ try{ return JSON.parse(localStorage.getItem('ca_bookmarks')||'{}'); }catch(e){ return {}; } }
function saveBookmarks(bm){ localStorage.setItem('ca_bookmarks', JSON.stringify(bm)); }

function formatDate(d){
  if(!d) return '';
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function formatSummary(summary){
  if(!summary) return '';
  if(summary.includes('\n')){
    const lines = summary.split(/\n+/).map(l=>l.replace(/^[\-•*]\s*/,'').trim()).filter(Boolean);
    if(lines.length > 1) return lines.map(l=>'<span style="display:block;padding-left:1.1rem;text-indent:-1.1rem">• '+escHtml(l)+'</span>').join('');
  }
  const abbrevs = /\b(Mr|Mrs|Ms|Dr|Prof|Sr|Jr|St|vs|etc|e\.g|i\.e|No|Rs|Mt|Smt|Shri|Lt|Col|Gen|Capt|Maj|Brig|Adm|Cmdr|Insp|Supt|Fig|Vol|Dept|Govt|Corp|Ltd|Inc|Co|Jan|Feb|Mar|Apr|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\.$/i;
  const text = summary.trim();
  const parts = [];
  let current = '';
  const tokens = text.split(/(\.(?:\s+|\s*$))/);
  for(let i=0;i<tokens.length;i++){
    const tok = tokens[i];
    if(/^\.(\s+|\s*$)/.test(tok)){
      const prevWord = current.trim().split(/\s+/).pop()||'';
      const isAbbrev = abbrevs.test(prevWord+'.');
      const isNumber = /^\d+$/.test(prevWord)||/\d$/.test(prevWord);
      const isInitial = /^[A-Z]$/.test(prevWord);
      const isUrl = /\.(com|org|in|gov|net|edu|io)$/.test(current.trim());
      if(isAbbrev||isNumber||isInitial||isUrl){ current+=tok; }
      else { current+='.'; const t=current.trim(); if(t) parts.push(t); current=''; }
    } else { current+=tok; }
  }
  if(current.trim()) parts.push(current.trim());
  const validParts = parts.filter(p=>p.length>15);
  if(validParts.length<=1) return '<span style="display:block;padding-left:1.1rem;text-indent:-1.1rem">• '+escHtml(text)+'</span>';
  return validParts.map(l=>'<span style="display:block;padding-left:1.1rem;text-indent:-1.1rem">• '+escHtml(l)+'</span>').join('');
}

function removeBookmark(id){
  const bm = getBookmarks();
  delete bm[id];
  saveBookmarks(bm);
  render();
}

function clearAll(){
  if(!confirm('Are you sure? All bookmarks will be cleared.')) return;
  localStorage.removeItem('ca_bookmarks');
  render();
}

function copyText(btn, encoded){
  navigator.clipboard.writeText(decodeURIComponent(encoded));
  btn.textContent='✓ Copied';
  setTimeout(()=>btn.textContent='📋 Copy',2000);
}

function render(){
  const bm = getBookmarks();
  const articles = Object.values(bm);
  const list = document.getElementById('articleList');
  const countEl = document.getElementById('bmCount');

  countEl.textContent = articles.length ? articles.length+' article'+(articles.length>1?'s':'') : '';

  if(!articles.length){
    document.getElementById('filterBar').innerHTML = '';
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔖</div>
        <h3>No bookmarks yet</h3>
        <p>Click 🏷️ on any article in Current Affairs to save it here.</p>
        <p style="margin-top:.75rem"><a href="news.html">→ Browse Current Affairs</a></p>
      </div>`;
    return;
  }

  // Build category filter buttons
  const cats = ['All', ...new Set(articles.map(a=>a.category).filter(Boolean))];
  document.getElementById('filterBar').innerHTML = cats.map(c=>
    `<button class="filter-btn ${c===activeFilter?'active':''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');

  // Filter
  const filtered = activeFilter === 'All' ? articles : articles.filter(a=>a.category===activeFilter);

  if(!filtered.length){
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><h3>No articles in this category</h3></div>`;
    return;
  }

  list.innerHTML = filtered.map((a,i)=>{
    const cls = CAT_CLASS[a.category]||'c-nat';
    const pct = Math.round((a.confidence||0)*100);
    const sourceUrl = (a.url && a.url.startsWith('http')) ? a.url : (a.source_url && a.source_url.startsWith('http')) ? a.source_url : '';
    const delay = i*0.04;
    return `
    <div class="article-card" style="animation-delay:${delay}s">
      <div class="card-meta">
        <span class="cat-badge ${cls}">${escHtml(a.category||'')}</span>
        ${sourceUrl
          ? `<a href="${sourceUrl}" target="_blank" rel="noopener" class="source-label source-link">📰 ${escHtml(a.source||'Source')} ↗</a>`
          : `<span class="source-label">📰 ${escHtml(a.source||'Unknown')}</span>`}
        <span class="date-label">${formatDate(a.date)}</span>
      </div>
      <div class="card-headline">${escHtml(a.headline)}</div>
      <div class="card-summary">${formatSummary(a.summary)}</div>
      <div class="card-footer">
        ${sourceUrl
          ? `<a href="${sourceUrl}" target="_blank" rel="noopener" class="view-src">View Source ↗</a>`
          : '<span class="view-src" style="opacity:.4">No source link</span>'}
        <button class="copy-btn" onclick="copyText(this,'${encodeURIComponent((a.headline||'')+'\n\n'+(a.summary||''))}')">📋 Copy</button>
        <button class="remove-btn" onclick="removeBookmark(${a.id})">🗑 Remove</button>
      </div>
    </div>`;
  }).join('');
}

function setFilter(cat){
  activeFilter = cat;
  render();
}

render();
</script>
</body>
</html>
